<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-shell login-shell dashboard-style-shell">
    <div class="backdrop"></div>
    <div class="admin-dashboard login-dashboard-shell">
      <main class="admin-main login-main">
        <header class="admin-topbar login-topbar">
          <div class="admin-brand">
            <div class="admin-brand-mark">A</div>
            <div class="admin-brand-copy">
              <strong>AMAST</strong>
              <span>Course Matching</span>
            </div>
          </div>
          <div class="hero-links login-top-links">
            <a class="ghost-link" href="/">Back to home</a>
            <a class="ghost-link" href="/user">Continue as user</a>
          </div>
        </header>

        <section class="admin-hero-banner login-hero-banner">
          <h1>Admin Login</h1>
          <p>Sign in to run imports and manage the course catalogue.</p>
        </section>

        <section class="panel login-panel">
          <div class="panel-heading">
            <h2>Sign in to the admin console</h2>
            <p>
              Administrators can run catalogue imports and manage university data.
              The student-facing matching pages remain open without a login.
            </p>
          </div>
          <form id="admin-login-form" class="stack-form login-form">
            <label>
              Username
              <input type="text" name="username" autocomplete="username" required />
            </label>
            <label>
              Password
              <input type="password" name="password" autocomplete="current-password" required />
            </label>
            <div class="form-actions login-actions">
              <button type="submit" class="primary-button">Log in</button>
              <span id="login-status" class="status-text"></span>
            </div>
          </form>
        </section>
      </main>
    </div>
    <script src="/admin-login.js"></script>
  </body>
</html>
